<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trello Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="#">Home</a>
      <a href="#">Workspace</a>
      <a href="#">Contact</a>
    </nav>

    <div class="main-content">
      <div class="items-container" draggable="true">
        <div class="top-container">
          <h2>Current Board</h2>
          <button class="delete-container-btn">X</button>
        </div>
        <ul></ul>
        <button class="add-item-btn">+ Add Item</button>
        <form autocomplete="off">
          <div class="top-form-container">
            <label for="item">Add a new item</label>
            <button class="close-form-btn">X</button>
          </div>
          <input type="text" id="item" placeholder="Enter an item..." />
          <span class="validation-msg"> </span>
          <button type="submit" class="submit-btn">Submit</button>
        </form>
      </div>

      <div class="items-container" draggable="true">
        <div class="top-container">
          <h2>To Do</h2>
          <button class="delete-container-btn">X</button>
        </div>
        <ul></ul>
        <button class="add-item-btn">+ Add Item</button>
        <form autocomplete="off">
          <div class="top-form-container">
            <label for="item">Add a new item</label>
            <button class="close-form-btn">X</button>
          </div>
          <input type="text" id="item" placeholder="Enter an item..." />
          <span class="validation-msg"> </span>
          <button type="submit" class="submit-btn">Submit</button>
        </form>
      </div>

      <div class="items-container" draggable="true">
        <div class="top-container">
          <h2>Done</h2>
          <button class="delete-container-btn">X@</button>
        </div>
        <ul></ul>
        <button class="add-item-btn">+ Add Item</button>
        <form autocomplete="off">
          <div class="top-form-container">
            <label for="item">Add a new item</label>
            <button class="close-form-btn">X</button>
          </div>
          <input type="text" id="item" placeholder="Enter an item..." />
          <span class="validation-msg"> </span>
          <button type="submit" class="submit-btn">Submit</button>
        </form>
      </div>
      <div class="add-new-container">
        <button class="add-container-btn">Add another Container</button>
        <form autocomplete="off">
          <div class="top-form-container">
            <label for="new-container">Add a new container</label>
            <button class="close-form-btn">X</button>
          </div>
          <input
            type="text"
            id="new-container"
            placeholder="Enter a container name..."
          />
          <span class="validation-msg"> </span>
          <button type="submit" class="submit-btn">Submit</button>
        </form>
      </div>
    </div>
    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
